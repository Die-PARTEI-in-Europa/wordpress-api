name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site output directory
        run: |
          mkdir -p _site
          cp -r .github/pages/. _site/

      - name: Generate API reference with phpDocumentor
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            phpdoc/phpdoc:3 \
            -d /data/src -t /data/_site/reference --title "WordPress API SDK"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
